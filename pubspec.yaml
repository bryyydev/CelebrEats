name: celebreats
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_svg: ^2.0.10
  provider: ^6.0.5
  intl: ^0.18.0
  google_fonts: ^6.1.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # Logos & auth
    - assets/logo.png
    - assets/facebook.png
    - assets/google.png

    # Event images
    - assets/birthday.png
    - assets/baptism.png
    - assets/reunion.png
    - assets/wedding.png
    - assets/package_birthday.jpg
    - assets/wedding_package.jpg
    - assets/18bday_package.png
    - assets/kasal.jpg
    - assets/bday_ulit.jpg
    - assets/kasal_ulit.jpg
    - assets/binyag_yarn.jpg
    - assets/reunion_yarn.png
    - assets/javier_fam.png
    - assets/image_26.png
    - assets/manang_anna.png

    # SVG icons
    - assets/icons/changepassword_ic.svg
    - assets/icons/favorites_ic.svg
    - assets/icons/help_support_ic.svg
    - assets/icons/mybooking_ic.svg
    - assets/icons/notification_ic.svg
    - assets/icons/payment_method_ic.svg
    - assets/icons/person_ic.svg
    - assets/icons/privacy_policy_ic.svg
    - assets/icons/terms_condition_ic.svg
    - assets/icons/settings_ic.svg